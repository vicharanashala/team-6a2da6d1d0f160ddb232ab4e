# ═══════════════════════════════════════════════════════════════════════════════
#  Yaksha FAQ Portal — Docker Compose Production Override
#
#  Usage (on VPS):
#    docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
#  This override replaces `build:` with `image:` so services pull
#  pre-built images from Docker Hub instead of building locally.
#
#  Required env vars (set on VPS or in .env):
#    DOCKERHUB_USERNAME  — Docker Hub account (e.g., vicharanashala)
#    TAG                 — Image tag (defaults to "latest")
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  backend:
    image: ${DOCKERHUB_USERNAME:-vicharanashala}/csfaq-backend:${TAG:-latest}
    build: !reset null
    env_file: []
    environment:
      - NODE_ENV=production
      - INFISICAL_TOKEN
      - INFISICAL_ENVIRONMENT
      - INFISICAL_PROJECT_ID
      - INFISICAL_SECRET_PATH
    command: ["sh", "-c", "infisical run --env=\"$$INFISICAL_ENVIRONMENT\" --projectId=\"$$INFISICAL_PROJECT_ID\" --path=\"$$INFISICAL_SECRET_PATH\" -- node --import tsx src/server.ts"]

  mongodb:
    # Use same image, but persist data on a named volume
    volumes:
      - mongodb_data:/data/db
