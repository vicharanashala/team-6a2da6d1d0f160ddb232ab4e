name: Bug Report
description: Something is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        For **security issues**, do NOT open a public issue — email the maintainers directly.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the system is affected?
      options:
        - Backend (API / Express)
        - Frontend (React / UI)
        - Pipeline — auto-answer
        - Pipeline — FAQ audit
        - Pipeline — Zoom ingestion
        - Search (hybrid vector + keyword)
        - Auth / middleware
        - Infrastructure / Docker
        - Other
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "Node version, OS, branch name or commit SHA"
      placeholder: "Node 20.x, Ubuntu 22.04, main @ a2f1f7a"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the bug
      placeholder: |
        1. POST /api/search with body { "query": "..." }
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste backend logs, browser console errors, or API responses
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: UI bugs — attach a screenshot or screen recording

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Related issues, workarounds discovered, suspected root cause
